name: Tagesschau Summarizer

on:
  schedule:
    - cron: '45 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yt-dlp google-generativeai resend
        sudo apt-get update
        sudo apt-get install ffmpeg -y

    - name: Run Tagesschau AI Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
      run: python .github/scripts/process.py

    - name: Commit and push HTML transcript
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add Website/transkripte/ transkripte/ || echo "Keine Dateien im Root"
        git commit -m "Automatisch erstelltes Tagesschau-Transkript hinzugefügt 🚀" || echo "Keine neuen Änderungen zum committen gefunden"
        git push
